<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="canvas-clip">
      <circle cx="200" cy="200" r="198"/>
    </clipPath>

    <!-- Blue glow behind crescent -->
    <radialGradient id="glow" cx="42%" cy="54%" r="45%">
      <stop offset="0%"  stop-color="#4f8ff7" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#4f8ff7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4f8ff7" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft bloom on the moon body -->
    <filter id="bloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <circle cx="200" cy="200" r="200" fill="#08080a"/>

  <!-- Outer border -->
  <circle cx="200" cy="200" r="198" fill="none" stroke="#1e1e23" stroke-width="1.5"/>

  <g clip-path="url(#canvas-clip)">

    <!-- Blue radial glow -->
    <circle cx="200" cy="200" r="200" fill="url(#glow)"/>

    <!-- Star field -->
    <circle cx="80"  cy="88"  r="1.2" fill="#f5f5f7" opacity="0.55"/>
    <circle cx="312" cy="72"  r="1"   fill="#f5f5f7" opacity="0.45"/>
    <circle cx="338" cy="162" r="0.9" fill="#f5f5f7" opacity="0.38"/>
    <circle cx="58"  cy="278" r="1.1" fill="#f5f5f7" opacity="0.42"/>
    <circle cx="344" cy="305" r="1"   fill="#f5f5f7" opacity="0.32"/>
    <circle cx="128" cy="334" r="0.8" fill="#f5f5f7" opacity="0.38"/>
    <circle cx="292" cy="342" r="1.2" fill="#f5f5f7" opacity="0.48"/>
    <circle cx="68"  cy="168" r="0.9" fill="#f5f5f7" opacity="0.32"/>
    <circle cx="355" cy="220" r="0.8" fill="#f5f5f7" opacity="0.28"/>

    <!-- Moon body (with soft bloom) -->
    <circle cx="185" cy="200" r="106" fill="#e8eaf2" filter="url(#bloom)"/>

    <!-- Crescent cutout -->
    <circle cx="232" cy="178" r="96" fill="#08080a"/>

    <!-- Orbit ring — drawn ON TOP of moon so it's always visible -->
    <g transform="translate(200,200) rotate(-28)">
      <ellipse cx="0" cy="0" rx="145" ry="50"
               fill="none"
               stroke="#4f8ff7"
               stroke-width="1.8"
               stroke-opacity="0.5"
               stroke-dasharray="5 6.5"/>
    </g>

    <!-- Blue rim light around full moon edge -->
    <circle cx="185" cy="200" r="106"
            fill="none"
            stroke="#4f8ff7"
            stroke-width="2"
            stroke-opacity="0.2"/>

  </g>
</svg>
